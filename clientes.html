<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Clientes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Clientes</h1>

<button onclick="window.location.href='cliente-form.html'">Incluir</button>

<ul id="lista"></ul>

<script>
let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

function render(){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  clientes.forEach(c => {
    lista.innerHTML += `
      <li>
        ${c.nome} - ${c.contato?.celular || ""}
      </li>
    `;
  });
}

render();
</script>

</body>
</html>
